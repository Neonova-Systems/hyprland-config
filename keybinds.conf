# vim:ft=hyprlang
submap = reset # Create global submapping, the keybinding below this line will be default, DO NOT REMOVE THIS LINE!!!
$zsh = /usr/bin/zsh -ic

# ‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚Ėą‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖĎ‚Ėą‚ĖĄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖĄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ĖÄ
# ‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚ĖÄ‚ĖÄ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ
# ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ
# Syntax for creating keybinding: bind = MOD,key,Dispatcher,params 
# See the wiki -- https://wiki.hyprland.org/Configuring/Binds/
bindd = SUPERSHIFT,E,Exit Hyprland,exit,           # Super + Shift + e:    Exit hyprland 
bindd = SUPER,C,Close active window,killactive,    # Super + c:            Close application
bindd = SUPER,F,Toggle fullscreen,fullscreen,0     # Super + f:            Fullscreen mode
bind = SUPERSHIFT,F,workspaceopt,allfloat           # Super + Shift + f:    Toggle workspace floating mode
bindm = SUPER,mouse:272,movewindow                  # Super + LeftClick:    Move window
bind = SUPER,print,exec, $zsh "scan-qr"             # Super + Printscreen:  Scan QR
bind = SUPERCONTROL,P,pin,active                    # Super + Control + t:  Toggle pin focused window (i.e. show it on all workspaces) [ONLY FLOATING WINDOW]
bind = SUPER,M,layoutmsg,swapwithmaster             # Swaps the current window with master
bind = SUPER,return,layoutmsg,focusmaster           # focuses the master window
bind = SUPER,i,layoutmsg,addmaster                  # Super + d:                Adds a master to the master side. That will be the active window, if it‚Äôs not a master, or the first non-master window.
bind = SUPER,d,layoutmsg,removemaster               # Super + i:                Removes a master from the master side. That will be the active window, if it‚Äôs a master, or the last master window.
bind = SUPERSHIFT,space,layoutmsg,orientationnext   # Super + Shift + Space:    Cycle to the next orientation for the current workspace (clockwise)
bind = SUPER,j,layoutmsg,cyclenext noloop           # Super + j:            Focus to next window on the layout
bind = SUPER,k,layoutmsg,cycleprev noloop           # Super + k:            Focus to previous window on the layout
bind = SUPERSHIFT,j,layoutmsg,swapnext noloop       # Super + Shift + j:    Swaps the focused window with next window on the layout
bind = SUPERSHIFT,k,layoutmsg,swapprev noloop       # Super + Shift + k:    Swaps the focused window with previous window on the layout
binde = SUPER,H,layoutmsg,mfact -0.05               # Super + h:            Decrease size of main area(to left)
binde = SUPER,L,layoutmsg,mfact +0.05               # Super + l:            Increase size of main area(to right)

# ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ĖÄ‚ĖĎ‚ĖÄ‚Ėą‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą
# ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ
bindd = SUPER,space,Toggle floating,togglefloating, # Super + Space:        Toggle float
bindd = SUPER,space,Center floating window,centerwindow, # &                     Center window
bindd = SUPER,TAB,Cycle to next window,cyclenext,  # Super + Tab:          Focuses next window on a workspace
bind = SUPER,Tab,alterzorder,top        # &                     Bring floating window to top (replacement for deprecated bringactivetotop)
bind = SUPERSHIFT,TAB,cyclenext,prev    # Super + Shift + Tab:  Focuses prev window on a workspace
bind = SUPERSHIFT,Tab,alterzorder,top
bindd = SUPER,left,Focus window left,movefocus,l   # Super + Left:         Focus window left
bindd = SUPER,right,Focus window right,movefocus,r # Super + Right:        Focus window right
bindd = SUPER,up,Focus window up,movefocus,u       # Super + Up:           Focus window up
bindd = SUPER,down,Focus window down,movefocus,d   # Super + Down:         Focus window down
bind = SUPERSHIFT,left,swapwindow,l     # Super + Shift + Left: Swap with left window
bind = SUPERSHIFT,right,swapwindow,r    # Super + Shift + Right:Swap with right window
bind = SUPERSHIFT,up,swapwindow,u       # Super + Shift + Up:   Swap with up window
bind = SUPERSHIFT,down,swapwindow,d     # Super + Shift + Down: Swap with down window
bind = SUPER,grave,focuscurrentorlast,  # Super + `:            Toggle focus between current and last window
bind = SUPER,U,focusurgentorlast,       # Super + u:            Focus urgent window, else last

# ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖĎ‚Ėą‚ĖĄ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ‚ĖÄ‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ
bind = SUPERSHIFT,mouse_up,workspace,e-1    # Super + Shift + Scroll Up:    Change to previous workspace
bind = SUPERSHIFT,mouse_down,workspace,e+1  # Super + Shift + Scroll Down:  Change to next workspace
bind = SUPER,1,workspace,1                  # Super + (number):     Changes to workspace (number)
bind = SUPER,2,workspace,2                  
bind = SUPER,3,workspace,3                  
bind = SUPER,4,workspace,4                  
bind = SUPER,5,workspace,5                  
bind = SUPER,6,workspace,6                  
bind = SUPER,7,workspace,7                  
bind = SUPER,8,workspace,8                  
bind = SUPER,9,workspace,9                  
bind = SUPERCONTROL,1,focusworkspaceoncurrentmonitor,1 # Super + Ctrl + number: Focus workspace on current monitor
bind = SUPERCONTROL,2,focusworkspaceoncurrentmonitor,2
bind = SUPERCONTROL,3,focusworkspaceoncurrentmonitor,3
bind = SUPERCONTROL,4,focusworkspaceoncurrentmonitor,4
bind = SUPERCONTROL,5,focusworkspaceoncurrentmonitor,5
bind = SUPERCONTROL,6,focusworkspaceoncurrentmonitor,6
bind = SUPERCONTROL,7,focusworkspaceoncurrentmonitor,7
bind = SUPERCONTROL,8,focusworkspaceoncurrentmonitor,8
bind = SUPERCONTROL,9,focusworkspaceoncurrentmonitor,9
bind = SUPER,0,togglespecialworkspace,      # Super + 0:            Toggles special workspace
bind = SUPERSHIFT,1,movetoworkspacesilent,1 # Super + Shift + (number): Move focused window to workspace (number)
bind = SUPERSHIFT,2,movetoworkspacesilent,2  
bind = SUPERSHIFT,3,movetoworkspacesilent,3  
bind = SUPERSHIFT,4,movetoworkspacesilent,4  
bind = SUPERSHIFT,5,movetoworkspacesilent,5  
bind = SUPERSHIFT,6,movetoworkspacesilent,6  
bind = SUPERSHIFT,7,movetoworkspacesilent,7  
bind = SUPERSHIFT,8,movetoworkspacesilent,8  
bind = SUPERSHIFT,9,movetoworkspacesilent,9  
bind = SUPERSHIFT,0,movetoworkspace,special # Super + Shift + 0:    Move focused window to special workspace (scratchpad)


# ‚ĖĎ‚Ėą‚ĖĄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ĖÄ‚ĖĎ‚ĖÄ‚Ėą‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ
# ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ
# ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ
bind = SUPER,Comma,focusmonitor,l         # Super + ,:          Focuses to left monitor
bind = SUPER,Period,focusmonitor,r        # Super + .:          Focuses to right monitor
bind = SUPERALT,Comma,movewindow,mon:l    # Super + Alt + ,:    Send focused window to left monitor
bind = SUPERALT,Period,movewindow,mon:r   # Super + Alt + .:    Send focused window to right monitor
bind = SUPERALT,left,movecurrentworkspacetomonitor,l   # Super + Alt + Left: Move current workspace to left monitor
bind = SUPERALT,right,movecurrentworkspacetomonitor,r  # Super + Alt + Right: Move current workspace to right monitor

# ‚ĖĎ‚Ėą‚ĖĄ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚ĖÄ‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ
# ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ
bind = SUPERSHIFT,R,forcerendererreload,                                    # Super + Shift + r:            Forces the renderer to reload all resources and outputs.
bind = SUPERALT,R,submap,resize                                             # Super + Alt + r:              Enter resize mode
bindd = SUPERSHIFT,L,Lock screen,exec, $zsh "lock-screen"                  # Super + Shift + l:            Lock screen
bindd = SUPER,E,Open file manager,exec, /usr/bin/nautilus                   # Super + e:                    File manager
bind = SUPER,P,exec, vicinae                                                # Super + p:                    Start wofi on first press, closes it on second
bind = SUPERSHIFT,P,exec, pkill wofi || $zsh "wofi-core"                    # Super + Shift + p:            Spawn wofi modules launcher
bind = SUPER,V,exec, pkill wofi || $zsh "autoload wofi-clipboard; wofi-clipboard" # Super + v:              Open Clipboard history
bind = SUPER,semicolon,exec, pkill wofi || $zsh "autoload wofi-unicode; wofi-unicode" # Super + ;:          Open emoji picker
bindd = SUPER,R,Reload Hyprland config,exec, hyprctl reload                 # Super + r:                    Reload configuration, now you do not need to exit&start to reload stuff.
bindd = SUPERCONTROL,return,Open terminal,exec, foot                        # Super + Control + Enter:      Spawn terminal
bindel = , XF86MonBrightnessUp, exec, $zsh "brightness-handler up"           # Bright_up:   Increase brightness (held repeats, works on lock)
bindel = , XF86MonBrightnessDown, exec, $zsh "brightness-handler down"       # Bright_down: Decrease brightness (held repeats, works on lock)
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Volume_down: Decrease volume (held repeats, works on lock)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ # Volume_up:   Increase volume (held repeats, works on lock)
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle    # Volume_mute: Toggle mute (works on lock)
bindl = , XF86AudioPlay, exec, playerctl play-pause                          # Play/Pause media (works on lock)
bindl = , XF86AudioPrev, exec, playerctl previous                            # Previous track (works on lock)
bindl = , XF86AudioNext, exec, playerctl next                                # Next track (works on lock)
bind = ,print,exec, $zsh "screenshot"                                       # Printscreen:                  Screenshot
bind = SUPERSHIFT,S,exec, $zsh "autoload screenshot-area; screenshot-area"  # Super + Shift + S:            Screenshot Area
bind = SUPERSHIFT,T,exec, $zsh "screen-ocr"                                 # Super + Shift + T:            Extract text from your screen
bind = SUPER, F10, pass, class:^(com\.obsproject\.Studio)$                  # Super + F10: Pass keybind to OBS
bind = SUPER,Insert, exec, $zsh "bookmarks-grabber"                         # Super + Insert:               Pick entry from bookmark file

# ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ‚Ėą‚ĖĄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą
# ‚ĖĎ‚ĖÄ‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚Ėą‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ
# https://wiki.hyprland.org/Configuring/Binds/#submaps
bind = SUPER,mouse:274,exec,eww open spawn-widget --pos $(sh ~/.config/eww/function/get-cursor-center 50 130) --toggle
bind = SUPER,mouse:274,submap,context-menu-spawn-widget
bind = SUPER,mouse:273,exec,ags run ~/.config/ags/window/ContextMenu.tsx
bind = SUPERCONTROL,mouse:273,submap,manage-window                           # Super + Control + RMB: Enter window manage mode (move/resize)
bind = SUPER,mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = SUPER,mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind = SUPERSHIFT,mouse:274,exec, hyprctl -q keyword cursor:zoom_factor 1    # Super + Shift + MMB: Reset zoom to 1x
bindu = ,escape,submap,reset                                                 # Universal escape from any submap

submap = mouse-mode
bind = ,escape,submap,reset     # ESC: Use reset to go back to the global submap
binde = ,h,exec,movecursor -l   # h: Move cursor into left position
binde = ,j,exec,movecursor -d   # j: Move cursor into down position
binde = ,k,exec,movecursor -u   # k: Move cursor into up position
binde = ,l,exec,movecursor -r   # l: Move cursor into right position
bind = ,catchall,submap,reset   # Any other key exits mouse mode

submap = context-menu-spawn-widget
bind = ,escape,submap,reset      # ESC: Use reset to go back to the global submap
bind = ,a,exec,eww open system-status --pos $(hyprctl cursorpos | tr -d ' ' | tr ',' 'x') --toggle; eww close spawn-widget
bind = ,a,submap,reset
bind = ,catchall,submap,reset    # Any unrecognized key closes the menu

submap = manage-window
bind = ,escape,submap,reset      # ESC: Use reset to go back to the global submap
bindm = ,mouse:272,movewindow    # LeftClick:      Move window
bindm = ,mouse:273,resizewindow  # RightClick:     Resize window
bind = ,mouse:272,submap,reset   # Leftclick release will exit this submap
bind = ,mouse:273,submap,reset   # RightClick release will exit this submap
bind = ,catchall,submap,reset    # Any key exits window management mode

submap = resize
binde = , h, resizeactive, -20 0  # h: Shrink width
binde = , l, resizeactive, 20 0   # l: Grow width
binde = , k, resizeactive, 0 -20  # k: Shrink height
binde = , j, resizeactive, 0 20   # j: Grow height
bind = , escape, submap, reset    # ESC: Exit resize mode
bind = , catchall, submap, reset  # Any other key exits resize mode
submap = reset
