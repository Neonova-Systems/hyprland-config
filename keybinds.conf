# vim:ft=hyprlang
submap = reset # Create global submapping, the keybinding below this line will be default, DO NOT REMOVE THIS LINE!!!
$zsh = /usr/bin/zsh -ic

 # Keybind format: bind[flags] = MOD, key, dispatcher, params
 # Reference: https://wiki.hypr.land/Configuring/Binds/

# Core window and layout controls
bindd = SUPERSHIFT,E,Exit Hyprland,exit,
bindd = SUPERCONTROL,S,Stop session via uwsm,exec, uwsm stop # Super + Ctrl + s: Graceful session stop (uwsm)
bindd = SUPER,C,Close active window,killactive,
bindd = SUPER,F,Toggle fullscreen,fullscreen,0
bindd = SUPERSHIFT,F,Toggle floating workspace mode,workspaceopt,allfloat
bindm = SUPER,mouse:272,movewindow
bindd = SUPER,print,Scan QR code,exec, $zsh "scan-qr"
bindd = SUPERCONTROL,P,Pin focused floating window,pin,active
bindd = SUPER,M,Swap with master,layoutmsg,swapwithmaster
bindd = SUPER,return,Focus master,layoutmsg,focusmaster
bindd = SUPER,i,Add master slot,layoutmsg,addmaster
bindd = SUPER,d,Remove master slot,layoutmsg,removemaster
bindd = SUPERSHIFT,space,Cycle layout orientation,layoutmsg,orientationnext
bindd = SUPER,j,Focus next in layout,layoutmsg,cyclenext noloop
bindd = SUPER,k,Focus previous in layout,layoutmsg,cycleprev noloop
bindd = SUPERSHIFT,j,Swap next in layout,layoutmsg,swapnext noloop
bindd = SUPERSHIFT,k,Swap previous in layout,layoutmsg,swapprev noloop
bindde = SUPER,H,Shrink master width,layoutmsg,mfact -0.05
bindde = SUPER,L,Grow master width,layoutmsg,mfact +0.05

# Focus, floating, and navigation
bindd = SUPER,space,Toggle floating,togglefloating,
bindd = SUPER,space,Center floating window,centerwindow,
bindd = SUPER,Tab,Cycle to next window,cyclenext,
bindd = SUPER,Tab,Raise active floating window,alterzorder,top
bindd = SUPERSHIFT,Tab,Cycle to previous window,cyclenext,prev
bindd = SUPERSHIFT,Tab,Raise active floating window,alterzorder,top
bindd = SUPER,left,Focus window left,movefocus,l
bindd = SUPER,right,Focus window right,movefocus,r
bindd = SUPER,up,Focus window up,movefocus,u
bindd = SUPER,down,Focus window down,movefocus,d
bindd = SUPERSHIFT,left,Swap with left window,swapwindow,l
bindd = SUPERSHIFT,right,Swap with right window,swapwindow,r
bindd = SUPERSHIFT,up,Swap with upper window,swapwindow,u
bindd = SUPERSHIFT,down,Swap with lower window,swapwindow,d
bindd = SUPER,grave,Focus current or last window,focuscurrentorlast,
bindd = SUPER,U,Focus urgent or last window,focusurgentorlast,

# Workspaces
bindd = SUPERSHIFT,mouse_up,Previous workspace,workspace,e-1
bindd = SUPERSHIFT,mouse_down,Next workspace,workspace,e+1
bind = SUPER,1,workspace,1
bind = SUPER,2,workspace,2                  
bind = SUPER,3,workspace,3                  
bind = SUPER,4,workspace,4                  
bind = SUPER,5,workspace,5                  
bind = SUPER,6,workspace,6                  
bind = SUPER,7,workspace,7                  
bind = SUPER,8,workspace,8                  
bind = SUPER,9,workspace,9                  
bind = SUPERCONTROL,1,focusworkspaceoncurrentmonitor,1
bind = SUPERCONTROL,2,focusworkspaceoncurrentmonitor,2
bind = SUPERCONTROL,3,focusworkspaceoncurrentmonitor,3
bind = SUPERCONTROL,4,focusworkspaceoncurrentmonitor,4
bind = SUPERCONTROL,5,focusworkspaceoncurrentmonitor,5
bind = SUPERCONTROL,6,focusworkspaceoncurrentmonitor,6
bind = SUPERCONTROL,7,focusworkspaceoncurrentmonitor,7
bind = SUPERCONTROL,8,focusworkspaceoncurrentmonitor,8
bind = SUPERCONTROL,9,focusworkspaceoncurrentmonitor,9
bindd = SUPER,0,Toggle special workspace,togglespecialworkspace,
bind = SUPERSHIFT,1,movetoworkspacesilent,1
bind = SUPERSHIFT,2,movetoworkspacesilent,2  
bind = SUPERSHIFT,3,movetoworkspacesilent,3  
bind = SUPERSHIFT,4,movetoworkspacesilent,4  
bind = SUPERSHIFT,5,movetoworkspacesilent,5  
bind = SUPERSHIFT,6,movetoworkspacesilent,6  
bind = SUPERSHIFT,7,movetoworkspacesilent,7  
bind = SUPERSHIFT,8,movetoworkspacesilent,8  
bind = SUPERSHIFT,9,movetoworkspacesilent,9  
bind = SUPERSHIFT,0,movetoworkspace,special


# Monitors
bindd = SUPER,Comma,Focus left monitor,focusmonitor,l
bindd = SUPER,Period,Focus right monitor,focusmonitor,r
bindd = SUPERALT,Comma,Move window to left monitor,movewindow,mon:l
bindd = SUPERALT,Period,Move window to right monitor,movewindow,mon:r
bindd = SUPERALT,left,Move current workspace to left monitor,movecurrentworkspacetomonitor,l
bindd = SUPERALT,right,Move current workspace to right monitor,movecurrentworkspacetomonitor,r
bindd = SUPERALT,S,Swap active workspaces between monitors,swapactiveworkspaces,current +1

# Launchers, media, and utilities
bindd = SUPERSHIFT,R,Force renderer reload,forcerendererreload,
bindd = SUPERALT,R,Enter resize submap,submap,resize
bindd = SUPERSHIFT,L,Lock screen,exec, $zsh "lock-screen"
bindd = SUPER,E,Open file manager,exec, /usr/bin/nautilus
bindd = SUPER,P,Open app launcher,exec, vicinae
bindd = SUPERSHIFT,P,Open launcher modules,exec, pkill wofi || $zsh "wofi-core"
bindd = SUPER,V,Open clipboard history,exec, pkill wofi || $zsh "autoload wofi-clipboard; wofi-clipboard"
bindd = SUPER,semicolon,Open unicode picker,exec, pkill wofi || $zsh "autoload wofi-unicode; wofi-unicode"
bindd = SUPER,R,Reload Hyprland config,exec, hyprctl reload
bindd = SUPERCONTROL,return,Open terminal,exec, foot
bindd = SUPERCONTROL,B,Focus or launch browser,exec, ~/.config/hypr/scripts/focus-or-launch browser
bindd = SUPERCONTROL,E,Focus or launch editor,exec, ~/.config/hypr/scripts/focus-or-launch editor
bindd = SUPERCONTROL,T,Focus or launch terminal,exec, ~/.config/hypr/scripts/focus-or-launch terminal
binddel = , XF86MonBrightnessUp,Increase brightness,exec, $zsh "brightness-handler up"
binddel = , XF86MonBrightnessDown,Decrease brightness,exec, $zsh "brightness-handler down"
binddel = , XF86AudioLowerVolume,Lower volume,exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binddel = , XF86AudioRaiseVolume,Raise volume,exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binddl = , XF86AudioMute,Toggle mute,exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindd = , XF86AudioMicMute,Toggle microphone mute,exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindd = SUPERCONTROL, XF86AudioLowerVolume,Lower microphone gain,exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-
bindd = SUPERCONTROL, XF86AudioRaiseVolume,Raise microphone gain,exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+
binddl = , XF86AudioPlay,Toggle play pause,exec, playerctl play-pause
binddl = , XF86AudioPrev,Previous track,exec, playerctl previous
binddl = , XF86AudioNext,Next track,exec, playerctl next
bindd = ,print,Take screenshot,exec, $zsh "screenshot"
bindd = SUPERSHIFT,S,Take area screenshot,exec, $zsh "autoload screenshot-area; screenshot-area"
bindd = SUPERSHIFT,T,Run screen OCR,exec, $zsh "screen-ocr"
bindd = SUPER, F10,Pass hotkey to OBS,pass, class:^(com\.obsproject\.Studio)$
bindd = SUPER,Insert,Open bookmark picker,exec, $zsh "bookmarks-grabber"
bindd = SUPERALT,X,Enter power submap,submap,power

# Submaps
# Mode entry points:
# SUPERALT + R -> resize
# SUPERCONTROL + mouse:273 -> manage-window
# SUPER + mouse:274 -> context-menu-spawn-widget
# escape (bindu) -> reset from any submap
bind = SUPER,mouse:274,exec,eww open spawn-widget --pos $(sh ~/.config/eww/function/get-cursor-center 50 130) --toggle
bind = SUPER,mouse:274,submap,context-menu-spawn-widget
bind = SUPER,mouse:273,exec,ags run ~/.config/ags/window/ContextMenu.tsx
bind = SUPERCONTROL,mouse:273,submap,manage-window
bind = SUPER,mouse_down,exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = SUPER,mouse_up,exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind = SUPERSHIFT,mouse:274,exec, hyprctl -q keyword cursor:zoom_factor 1

submap = mouse-mode
bind = ,escape,submap,reset
binde = ,h,exec,movecursor -l
binde = ,j,exec,movecursor -d
binde = ,k,exec,movecursor -u
binde = ,l,exec,movecursor -r
bind = ,catchall,submap,reset

submap = context-menu-spawn-widget
bind = ,escape,submap,reset
bind = ,a,exec,eww open system-status --pos $(hyprctl cursorpos | tr -d ' ' | tr ',' 'x') --toggle; eww close spawn-widget
bind = ,a,submap,reset
bind = ,catchall,submap,reset

submap = manage-window
bind = ,escape,submap,reset
bindm = ,mouse:272,movewindow
bindm = ,mouse:273,resizewindow
bind = ,mouse:272,submap,reset
bind = ,mouse:273,submap,reset
bind = ,catchall,submap,reset

submap = resize
binde = , h, resizeactive, -20 0
binde = , l, resizeactive, 20 0
binde = , k, resizeactive, 0 -20
binde = , j, resizeactive, 0 20
bind = , escape, submap, reset
bind = , catchall, submap, reset

submap = power
bindd = ,s,Suspend system,exec, systemctl suspend
bindd = ,r,Reboot system,exec, systemctl reboot
bindd = ,p,Power off system,exec, systemctl poweroff
bindd = ,l,Lock screen,exec, $zsh "lock-screen"
bindd = ,e,Stop user session,exec, uwsm stop
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset
