# vim:ft=hyprlang
submap = reset # Create global submapping, the keybinding below this line will be default, DO NOT REMOVE THIS LINE!!!
$zsh = /usr/bin/zsh -ic

# ░█▀▄░█▀█░█▀▀░▀█▀░█▀▀░░░█▄█░█▀█░█░█░█▀▀░█▄█░█▀▀░█▀█░▀█▀
# ░█▀▄░█▀█░▀▀█░░█░░█░░░░░█░█░█░█░▀▄▀░█▀▀░█░█░█▀▀░█░█░░█░
# ░▀▀░░▀░▀░▀▀▀░▀▀▀░▀▀▀░░░▀░▀░▀▀▀░░▀░░▀▀▀░▀░▀░▀▀▀░▀░▀░░▀░
# Syntax for creating keybinding: bind = MOD,key,Dispatcher,params 
# See the wiki -- https://wiki.hyprland.org/Configuring/Binds/
bindd = SUPERSHIFT,E,Exit Hyprland,exit,           # Super + Shift + e:    Exit hyprland 
bindd = SUPERCONTROL,S,Stop session via uwsm,exec, uwsm stop # Super + Ctrl + s: Graceful session stop (uwsm)
bindd = SUPER,C,Close active window,killactive,    # Super + c:            Close application
bindd = SUPER,F,Toggle fullscreen,fullscreen,0     # Super + f:            Fullscreen mode
bindd = SUPERSHIFT,F,Toggle floating workspace mode,workspaceopt,allfloat   # Super + Shift + f:    Toggle workspace floating mode
bindm = SUPER,mouse:272,movewindow                  # Super + LeftClick:    Move window
bindd = SUPER,print,Scan QR code,exec, $zsh "scan-qr"                       # Super + Printscreen:  Scan QR
bindd = SUPERCONTROL,P,Pin focused floating window,pin,active                # Super + Control + p:  Toggle pin focused window (floating only)
bindd = SUPER,M,Swap with master,layoutmsg,swapwithmaster                    # Swaps the current window with master
bindd = SUPER,return,Focus master,layoutmsg,focusmaster                      # focuses the master window
bindd = SUPER,i,Add master slot,layoutmsg,addmaster                          # Add a master to the master side
bindd = SUPER,d,Remove master slot,layoutmsg,removemaster                    # Remove a master from the master side
bindd = SUPERSHIFT,space,Cycle layout orientation,layoutmsg,orientationnext  # Super + Shift + Space: cycle orientation
bindd = SUPER,j,Focus next in layout,layoutmsg,cyclenext noloop              # Super + j: next window in layout
bindd = SUPER,k,Focus previous in layout,layoutmsg,cycleprev noloop          # Super + k: previous window in layout
bindd = SUPERSHIFT,j,Swap next in layout,layoutmsg,swapnext noloop           # Super + Shift + j: swap with next
bindd = SUPERSHIFT,k,Swap previous in layout,layoutmsg,swapprev noloop       # Super + Shift + k: swap with previous
bindde = SUPER,H,Shrink master width,layoutmsg,mfact -0.05                   # Super + h: decrease master area width
bindde = SUPER,L,Grow master width,layoutmsg,mfact +0.05                     # Super + l: increase master area width

# ░█▀▀░█░░░█▀█░█▀█░▀█▀░▀█▀░█▀█░█▀▀
# ░█▀▀░█░░░█░█░█▀█░░█░░░█░░█░█░█░█
# ░▀░░░▀▀▀░▀▀▀░▀░▀░░▀░░▀▀▀░▀░▀░▀▀▀
bindd = SUPER,space,Toggle floating,togglefloating, # Super + Space:        Toggle float
bindd = SUPER,space,Center floating window,centerwindow, # &                     Center window
bindd = SUPER,Tab,Cycle to next window,cyclenext,  # Super + Tab:          Focuses next window on a workspace
bindd = SUPER,Tab,Raise active floating window,alterzorder,top # &                     Bring floating window to top
bindd = SUPERSHIFT,Tab,Cycle to previous window,cyclenext,prev # Super + Shift + Tab:  Focuses prev window on a workspace
bindd = SUPERSHIFT,Tab,Raise active floating window,alterzorder,top
bindd = SUPER,left,Focus window left,movefocus,l   # Super + Left:         Focus window left
bindd = SUPER,right,Focus window right,movefocus,r # Super + Right:        Focus window right
bindd = SUPER,up,Focus window up,movefocus,u       # Super + Up:           Focus window up
bindd = SUPER,down,Focus window down,movefocus,d   # Super + Down:         Focus window down
bindd = SUPERSHIFT,left,Swap with left window,swapwindow,l     # Super + Shift + Left: Swap with left window
bindd = SUPERSHIFT,right,Swap with right window,swapwindow,r   # Super + Shift + Right:Swap with right window
bindd = SUPERSHIFT,up,Swap with upper window,swapwindow,u      # Super + Shift + Up:   Swap with up window
bindd = SUPERSHIFT,down,Swap with lower window,swapwindow,d    # Super + Shift + Down: Swap with down window
bindd = SUPER,grave,Focus current or last window,focuscurrentorlast, # Super + `: toggle current/last
bindd = SUPER,U,Focus urgent or last window,focusurgentorlast,  # Super + u: urgent else last

# ░█░█░█▀█░█▀▄░█░█░█▀▀░█▀█░█▀█░█▀▀░█▀▀
# ░█▄█░█░█░█▀▄░█▀▄░▀▀█░█▀▀░█▀█░█░░░█▀▀
# ░▀░▀░▀▀▀░▀░▀░▀░▀░▀▀▀░▀░░░▀░▀░▀▀▀░▀▀▀
bindd = SUPERSHIFT,mouse_up,Previous workspace,workspace,e-1    # Super + Shift + Scroll Up:    Change to previous workspace
bindd = SUPERSHIFT,mouse_down,Next workspace,workspace,e+1      # Super + Shift + Scroll Down:  Change to next workspace
bind = SUPER,1,workspace,1                  # Super + (number):     Changes to workspace (number)
bind = SUPER,2,workspace,2                  
bind = SUPER,3,workspace,3                  
bind = SUPER,4,workspace,4                  
bind = SUPER,5,workspace,5                  
bind = SUPER,6,workspace,6                  
bind = SUPER,7,workspace,7                  
bind = SUPER,8,workspace,8                  
bind = SUPER,9,workspace,9                  
bind = SUPERCONTROL,1,focusworkspaceoncurrentmonitor,1 # Super + Ctrl + number: Focus workspace on current monitor
bind = SUPERCONTROL,2,focusworkspaceoncurrentmonitor,2
bind = SUPERCONTROL,3,focusworkspaceoncurrentmonitor,3
bind = SUPERCONTROL,4,focusworkspaceoncurrentmonitor,4
bind = SUPERCONTROL,5,focusworkspaceoncurrentmonitor,5
bind = SUPERCONTROL,6,focusworkspaceoncurrentmonitor,6
bind = SUPERCONTROL,7,focusworkspaceoncurrentmonitor,7
bind = SUPERCONTROL,8,focusworkspaceoncurrentmonitor,8
bind = SUPERCONTROL,9,focusworkspaceoncurrentmonitor,9
bindd = SUPER,0,Toggle special workspace,togglespecialworkspace, # Super + 0:            Toggles special workspace
bind = SUPERSHIFT,1,movetoworkspacesilent,1 # Super + Shift + (number): Move focused window to workspace (number)
bind = SUPERSHIFT,2,movetoworkspacesilent,2  
bind = SUPERSHIFT,3,movetoworkspacesilent,3  
bind = SUPERSHIFT,4,movetoworkspacesilent,4  
bind = SUPERSHIFT,5,movetoworkspacesilent,5  
bind = SUPERSHIFT,6,movetoworkspacesilent,6  
bind = SUPERSHIFT,7,movetoworkspacesilent,7  
bind = SUPERSHIFT,8,movetoworkspacesilent,8  
bind = SUPERSHIFT,9,movetoworkspacesilent,9  
bind = SUPERSHIFT,0,movetoworkspace,special # Super + Shift + 0:    Move focused window to special workspace (scratchpad)


# ░█▄█░█▀█░█▀█░▀█▀░▀█▀░█▀█░█▀▄
# ░█░█░█░█░█░█░░█░░░█░░█░█░█▀▄
# ░▀░▀░▀▀▀░▀░▀░▀▀▀░░▀░░▀▀▀░▀░▀
bindd = SUPER,Comma,Focus left monitor,focusmonitor,l         # Super + ,:          Focuses to left monitor
bindd = SUPER,Period,Focus right monitor,focusmonitor,r       # Super + .:          Focuses to right monitor
bindd = SUPERALT,Comma,Move window to left monitor,movewindow,mon:l    # Super + Alt + ,:    Send focused window to left monitor
bindd = SUPERALT,Period,Move window to right monitor,movewindow,mon:r   # Super + Alt + .:    Send focused window to right monitor
bindd = SUPERALT,left,Move current workspace to left monitor,movecurrentworkspacetomonitor,l   # Super + Alt + Left
bindd = SUPERALT,right,Move current workspace to right monitor,movecurrentworkspacetomonitor,r  # Super + Alt + Right
bindd = SUPERALT,S,Swap active workspaces between monitors,swapactiveworkspaces,current +1      # Super + Alt + s

# ░█▄█░▀█▀░█▀▀░█▀▀
# ░█░█░░█░░▀▀█░█░░
# ░▀░▀░▀▀▀░▀▀▀░▀▀▀
bindd = SUPERSHIFT,R,Force renderer reload,forcerendererreload,            # Super + Shift + r:            Forces the renderer to reload all resources and outputs.
bindd = SUPERALT,R,Enter resize submap,submap,resize                       # Super + Alt + r:              Enter resize mode
bindd = SUPERSHIFT,L,Lock screen,exec, $zsh "lock-screen"                  # Super + Shift + l:            Lock screen
bindd = SUPER,E,Open file manager,exec, /usr/bin/nautilus                   # Super + e:                    File manager
bindd = SUPER,P,Open app launcher,exec, vicinae                             
bindd = SUPERSHIFT,P,Open launcher modules,exec, pkill wofi || $zsh "wofi-core" # Super + Shift + p:            Spawn wofi modules launcher
bindd = SUPER,V,Open clipboard history,exec, pkill wofi || $zsh "autoload wofi-clipboard; wofi-clipboard" # Super + v:              Open Clipboard history
bindd = SUPER,semicolon,Open unicode picker,exec, pkill wofi || $zsh "autoload wofi-unicode; wofi-unicode" # Super + ;:          Open emoji picker
bindd = SUPER,R,Reload Hyprland config,exec, hyprctl reload                 # Super + r:                    Reload configuration, now you do not need to exit&start to reload stuff.
bindd = SUPERCONTROL,return,Open terminal,exec, foot                        # Super + Control + Enter:      Spawn terminal
bindd = SUPERCONTROL,B,Focus or launch browser,exec, hyprctl dispatch focuswindow "class:^(firefox|chromium|Brave-browser)$" | grep "No such" && firefox
bindd = SUPERCONTROL,E,Focus or launch editor,exec, hyprctl dispatch focuswindow "class:^(code|Code|codium)$" | grep "No such" && code
bindd = SUPERCONTROL,T,Focus or launch terminal,exec, hyprctl dispatch focuswindow "class:^(foot|kitty|Alacritty)$" | grep "No such" && foot
binddel = , XF86MonBrightnessUp,Increase brightness,exec, $zsh "brightness-handler up"           # Bright_up:   Increase brightness (held repeats, works on lock)
binddel = , XF86MonBrightnessDown,Decrease brightness,exec, $zsh "brightness-handler down"       # Bright_down: Decrease brightness (held repeats, works on lock)
binddel = , XF86AudioLowerVolume,Lower volume,exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Volume_down: Decrease volume (held repeats, works on lock)
binddel = , XF86AudioRaiseVolume,Raise volume,exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ # Volume_up:   Increase volume (held repeats, works on lock)
binddl = , XF86AudioMute,Toggle mute,exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle    # Volume_mute: Toggle mute (works on lock)
bindd = , XF86AudioMicMute,Toggle microphone mute,exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindd = SUPERCONTROL, XF86AudioLowerVolume,Lower microphone gain,exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-
bindd = SUPERCONTROL, XF86AudioRaiseVolume,Raise microphone gain,exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+
binddl = , XF86AudioPlay,Toggle play pause,exec, playerctl play-pause                          # Play/Pause media (works on lock)
binddl = , XF86AudioPrev,Previous track,exec, playerctl previous                            # Previous track (works on lock)
binddl = , XF86AudioNext,Next track,exec, playerctl next                                # Next track (works on lock)
bindd = ,print,Take screenshot,exec, $zsh "screenshot"                                       # Printscreen:                  Screenshot
bindd = SUPERSHIFT,S,Take area screenshot,exec, $zsh "autoload screenshot-area; screenshot-area"  # Super + Shift + S:            Screenshot Area
bindd = SUPERSHIFT,T,Run screen OCR,exec, $zsh "screen-ocr"                                 # Super + Shift + T:            Extract text from your screen
bindd = SUPER, F10,Pass hotkey to OBS,pass, class:^(com\.obsproject\.Studio)$                  # Super + F10: Pass keybind to OBS
bindd = SUPER,Insert,Open bookmark picker,exec, $zsh "bookmarks-grabber"                         # Super + Insert:               Pick entry from bookmark file
bindd = SUPERALT,X,Enter power submap,submap,power                                                # Super + Alt + x: open power actions submap

# ░█▀▀░█░█░█▀▄░█▄█░█▀█░█▀█
# ░▀▀█░█░█░█▀▄░█░█░█▀█░█▀▀
# ░▀▀▀░▀▀▀░▀▀░░▀░▀░▀░▀░▀░░
# https://wiki.hyprland.org/Configuring/Binds/#submaps
# Mode entry points:
# SUPERALT + R -> resize
# SUPERCONTROL + mouse:273 -> manage-window
# SUPER + mouse:274 -> context-menu-spawn-widget
# escape (bindu) -> reset from any submap
bind = SUPER,mouse:274,exec,eww open spawn-widget --pos $(sh ~/.config/eww/function/get-cursor-center 50 130) --toggle
bind = SUPER,mouse:274,submap,context-menu-spawn-widget
bind = SUPER,mouse:273,exec,ags run ~/.config/ags/window/ContextMenu.tsx
bind = SUPERCONTROL,mouse:273,submap,manage-window                           # Super + Control + RMB: Enter window manage mode (move/resize)
bind = SUPER,mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = SUPER,mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind = SUPERSHIFT,mouse:274,exec, hyprctl -q keyword cursor:zoom_factor 1    # Super + Shift + MMB: Reset zoom to 1x

submap = mouse-mode
bind = ,escape,submap,reset     # ESC: Use reset to go back to the global submap
binde = ,h,exec,movecursor -l   # h: Move cursor into left position
binde = ,j,exec,movecursor -d   # j: Move cursor into down position
binde = ,k,exec,movecursor -u   # k: Move cursor into up position
binde = ,l,exec,movecursor -r   # l: Move cursor into right position
bind = ,catchall,submap,reset   # Any other key exits mouse mode

submap = context-menu-spawn-widget
bind = ,escape,submap,reset      # ESC: Use reset to go back to the global submap
bind = ,a,exec,eww open system-status --pos $(hyprctl cursorpos | tr -d ' ' | tr ',' 'x') --toggle; eww close spawn-widget
bind = ,a,submap,reset
bind = ,catchall,submap,reset    # Any unrecognized key closes the menu

submap = manage-window
bind = ,escape,submap,reset      # ESC: Use reset to go back to the global submap
bindm = ,mouse:272,movewindow    # LeftClick:      Move window
bindm = ,mouse:273,resizewindow  # RightClick:     Resize window
bind = ,mouse:272,submap,reset   # Leftclick release will exit this submap
bind = ,mouse:273,submap,reset   # RightClick release will exit this submap
bind = ,catchall,submap,reset    # Any key exits window management mode

submap = resize
binde = , h, resizeactive, -20 0  # h: Shrink width
binde = , l, resizeactive, 20 0   # l: Grow width
binde = , k, resizeactive, 0 -20  # k: Shrink height
binde = , j, resizeactive, 0 20   # j: Grow height
bind = , escape, submap, reset    # ESC: Exit resize mode
bind = , catchall, submap, reset  # Any other key exits resize mode

submap = power
bindd = ,s,Suspend system,exec, systemctl suspend
bindd = ,r,Reboot system,exec, systemctl reboot
bindd = ,p,Power off system,exec, systemctl poweroff
bindd = ,l,Lock screen,exec, $zsh "lock-screen"
bindd = ,e,Stop user session,exec, uwsm stop
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset
