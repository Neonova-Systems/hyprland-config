# vim:ft=hyprlang
submap = reset # Create global submapping, the keybinding below this line will be default, DO NOT REMOVE THIS LINE!!!
$zsh = /usr/bin/zsh -ic

# Keybind format: bind[flags] = MOD, key, dispatcher, params
# Reference: https://wiki.hypr.land/Configuring/Binds/
# Manifest:
#   core.conf        -> window lifecycle and layout controls
#   navigation.conf  -> focus, floating, directional movement
#   workspaces.conf  -> workspace switching and moving windows between workspaces
#   monitors.conf    -> monitor focus and workspace/window monitor moves
#   utilities.conf   -> launchers, media, screenshots, app jumps, submap entry binds
#   submap/*.conf submaps -> modal keymaps (mouse, manage, resize, power)

source = ~/.config/hypr/keybinds/core.conf
source = ~/.config/hypr/keybinds/navigation.conf
source = ~/.config/hypr/keybinds/workspaces.conf
source = ~/.config/hypr/keybinds/monitors.conf
source = ~/.config/hypr/keybinds/utilities.conf

# Submaps
bindd = SUPERALT,M,Enter mouse mode submap,submap,mouse-mode
bindd = SUPERALT,mouse:273,Enter manage window submap,submap,manage-window
bindd = SUPERALT,X,Enter power submap,submap,power
bindd = SUPERALT,R,Enter resize submap,submap,resize
# bindd = ,Alt_R,Hold right alt for hjkl arrow navigation,submap,ralt-nav

source = ~/.config/hypr/keybinds/submap/mouse-mode.conf
source = ~/.config/hypr/keybinds/submap/manage-window.conf
source = ~/.config/hypr/keybinds/submap/resize.conf
source = ~/.config/hypr/keybinds/submap/power.conf
# source = ~/.config/hypr/keybinds/submap/ralt-nav.conf
submap = reset
