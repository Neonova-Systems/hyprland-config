# https://wiki.hypr.land/0.54.0/Configuring/Gestures/

# Laptop-style defaults: keep primary navigation simple and put risky actions behind modifiers.
gesture = 3, horizontal, workspace

gesture = 4, up, fullscreen
gesture = 4, down, float
gesture = 4, left, special, scratchpad
gesture = 4, right, special, scratchpad

# Modifier-gated actions to avoid accidental triggering.
gesture = 4, down, mod: ALT, close
gesture = 4, pinchout, mod: ALT, cursorZoom, 1.5