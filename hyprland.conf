source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/reserved-space.conf

# exec-once = hyprpaper # Start Root wallpaper
# exec-once = hyprdim --duration 500
exec-once = swww-daemon
exec-once = vicinae server
exec-once = nm-applet --indicator # Start network-manager applet
exec-once = udiskie --appindicator # Start automounter for removable media, like usb, thumb drives, mobile phones, digital cameras, etc.
exec-once = gnome-keyring-daemon -rd # Start gnome-keyring
exec-once = foot --server # Start foot server, this will reduced startup time and reduced memory footprint
exec-once = ags run &> ~/.cache/ags/logs 
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # https://wiki.hyprland.org/FAQ/#some-of-my-apps-take-a-really-long-time-to-open
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 # Enable polkit-gnome for run root-application with normal user like gparted.
exec-once = wl-paste --watch clipman store --no-persist # Start clipboard manager wayland
exec = pgrep -f 'zsh\ -i.*autostart' && pkill -f 'zsh\ -i.*autostart' # Kill old autostart process, prevent from overlaping process
exec = zsh -i ~/.config/hypr/autostart # Run autostart file
# monitor=eDP-1, addreserved, 10, 270, 470, 10 # 1920 x 1080

# monitor = ,preferred,auto,1 # You can use preferred as a resolution to use the display's preferred size, and auto as an offset to let Hyprland decide on an offset for you.
# workspace = ,1 # Syntax for workspace: workspace=name,number <-- will tell Hyprland to make the default workspace on all monitors a number 1. -- https://wiki.hyprland.org/Configuring/Monitors/#default-workspace

general { # https://wiki.hyprland.org/Configuring/Variables/#general
    border_size = 0
    # no_border_on_floating = false
    gaps_in = 0
    gaps_out = 10
    layout = master
    resize_on_border = true
    extend_border_grab_area = 25
    hover_icon_on_border = true
    allow_tearing = true
    resize_corner = 3
    snap { # https://wiki.hyprland.org/Configuring/Variables/#snap
        enabled = true
        window_gap = 20
        monitor_gap = 20
    }
}

decoration { # https://wiki.hyprland.org/Configuring/Variables/#decoration
    rounding = 28
    rounding_power = 1.0
    # screen_shader = ~/.config/hypr/shader/vibrance.glsl # Path to a custom shader to be applied at the end of rendering.
    blur { # https://wiki.hyprland.org/Configuring/Variables/#shadow
        enabled = true
        size = 3
        passes = 4
    }
    shadow { # https://wiki.hyprland.org/Configuring/Variables/#shadow
        enabled = true
    }
}

animations { # https://wiki.hyprland.org/Configuring/Variables/#animations
    enabled = false
}

input { # https://wiki.hyprland.org/Configuring/Variables/#input
    kb_options = caps:escape_shifted_capslock   # Appropriate XKB keymap parameter <- Make unmodified Caps Lock an additional Esc, but Shift + Caps Lock behaves like regular Caps Lock
    repeat_rate = 50
    repeat_delay = 250
    scroll_points = custom 0.000 0.170 0.340 0.510 0.680 0.915 1.171 1.426 1.682 1.938 2.193 2.449 2.704 3.052 3.440 3.829 4.217 4.605 4.993 5.381 5.770 6.158 6.546 6.934 7.323 7.711 8.099 8.487 8.875 9.264 9.652 10.040 10.428 10.817 11.205 11.593 11.981 12.369 12.758 13.560
    float_switch_override_focus = 2
    
    touchpad { # https://wiki.hyprland.org/Configuring/Variables/#touchpad
        natural_scroll = true
        scroll_factor = 0.5
        middle_button_emulation = true
        drag_lock = true
    }
}

device { # https://gist.github.com/fufexan/de2099bc3086f3a6c83d61fc1fcc06c9
    name = asue1301:00-04f3:3128-touchpad
    accel_profile = custom 0.1678286744 0.000 0.040 0.080 0.129 0.189 0.250 0.310 0.370 0.448 0.540 0.631 0.723 0.815 0.906 0.998 1.089 1.181 1.273 1.364 1.456 1.548 1.639 1.731 1.823 2.012
    scroll_points = custom 0.1678286744 0.000 0.040 0.080 0.129 0.189 0.250 0.310 0.370 0.448 0.540 0.631 0.723 0.815 0.906 0.998 1.089 1.181 1.273 1.364 1.456 1.548 1.639 1.731 1.823 2.012
}

gestures { # https://wiki.hyprland.org/Configuring/Variables/#gestures
    # workspace_swipe = true
    # workspace_swipe_min_fingers = true
    workspace_swipe_distance = 700
    workspace_swipe_touch = true
    workspace_swipe_min_speed_to_force = 5 
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_direction_lock_threshold = 40
    workspace_swipe_use_r = true
}

misc { # https://wiki.hyprland.org/Configuring/Variables/#misc
    font_family = Rajdhani
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    enable_swallow = true
    swallow_regex = ^(foot)$
    focus_on_activate = true
    allow_session_lock_restore = true
    background_color = rgb(000000)
    # new_window_takes_over_fullscreen = 1
    exit_window_retains_fullscreen = true
}

binds { # https://wiki.hyprland.org/Configuring/Variables/#binds
    workspace_back_and_forth = true
    workspace_center_on = 1
    allow_workspace_cycles = true
    focus_preferred_method = 1
    allow_pin_fullscreen = true

}
render {
    cm_fs_passthrough = 1
    direct_scanout = 2
}

cursor { # https://wiki.hyprland.org/0.48.0/Configuring/Variables/#cursor
    persistent_warps = true
    inactive_timeout = 500
    hide_on_key_press = true
    warp_back_after_non_mouse_input = true
}

master { # https://wiki.hyprland.org/Configuring/Master-Layout/
    special_scale_factor = 0.9
    orientation = center
}

plugin {
    hyprwinwrap {
        class = GParted
        class = camera-mpv
        class = mpv
        class = eDEX-UI
    }
    hyprfocus {
        enabled = yes
        animate_floating = yes
        animate_workspacechange = yes
        focus_animation = shrink
        # Beziers for focus animations
        # bezier = bezIn, 0.5,0.0,1.0,0.5
        # bezier = bezOut, 0.0,0.5,0.5,1.0
        # bezier = overshot, 0.05, 0.9, 0.1, 1.05
        # bezier = smoothOut, 0.36, 0, 0.66, -0.56
        # bezier = smoothIn, 0.25, 1, 0.5, 1
        # bezier = realsmooth, 0.28,0.29,.69,1.08
        # Flash settings
        flash {
            flash_opacity = 0.95
            # in_bezier = realsmooth
            in_speed = 0.5
            # out_bezier = realsmooth
            out_speed = 3
        }
        # Shrink settings
        shrink {
            shrink_percentage = 0.95
            # in_bezier = realsmooth
            in_speed = 1
            # out_bezier = realsmooth
            out_speed = 2
        }
    }
}

source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrule.conf
