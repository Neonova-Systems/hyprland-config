# https://wiki.hypr.land/Configuring/Variables/#animations
# Reduced-motion companion profile.
# To use: source this file instead of variables/animations.conf.

animations {
    enabled = true

    bezier = calm, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 2, calm, gnomed
    animation = windowsIn, 1, 2, calm, gnomed
    animation = windowsOut, 1, 1, calm, gnomed
    animation = windowsMove, 1, 1, calm

    animation = fade, 1, 1, calm
    animation = fadeIn, 1, 1, calm
    animation = fadeOut, 1, 1, calm
    animation = fadeSwitch, 1, 1, calm
    animation = fadeShadow, 1, 1, calm
    animation = fadeDim, 1, 1, calm
    animation = fadeLayers, 1, 1, calm
    animation = fadeLayersIn, 1, 1, calm
    animation = fadeLayersOut, 1, 1, calm
    animation = fadePopups, 0
    animation = fadePopupsIn, 0
    animation = fadePopupsOut, 0
    animation = fadeDpms, 1, 2, calm

    animation = layers, 1, 2, calm, fade
    animation = layersIn, 1, 2, calm, fade
    animation = layersOut, 1, 1, calm, fade

    animation = workspaces, 1, 2, calm, fade
    animation = workspacesIn, 1, 2, calm, fade
    animation = workspacesOut, 1, 1, calm, fade
    animation = specialWorkspace, 1, 2, calm, fade
    animation = specialWorkspaceIn, 1, 2, calm, fade
    animation = specialWorkspaceOut, 1, 1, calm, fade

    animation = border, 0
    animation = borderangle, 0
    animation = zoomFactor, 1, 1, calm
    animation = monitorAdded, 1, 2, calm
}
