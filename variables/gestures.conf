# https://wiki.hypr.land/Configuring/Variables/#group
gestures { 
    # workspace_swipe = true
    workspace_swipe_distance = 700 	                                # in px, the distance of the touchpad gesture
    workspace_swipe_touch = true 	                                # enable workspace swiping from the edge of a touchscreen
    workspace_swipe_invert = true 	                                # invert the direction (touchpad only)
    workspace_swipe_touch_invert = false 	                        # invert the direction (touchscreen only)
    workspace_swipe_min_speed_to_force = 7 	                        # minimum speed in px per timepoint to force the change ignoring cancel_ratio. Setting to 0 will disable this mechanic.
    workspace_swipe_cancel_ratio = 0.33 	                        # how much the swipe has to proceed in order to commence it. (0.7 -> if > 0.7 * distance, switch, if less, revert) [0.0 - 1.0]
    workspace_swipe_create_new = true 	                            # whether a swipe right on the last workspace should create a new one.
    workspace_swipe_direction_lock = true 	                        # if enabled, switching direction will be locked when you swipe past the direction_lock_threshold (touchpad only).
    workspace_swipe_direction_lock_threshold = 33 	                # in px, the distance to swipe before direction lock activates (touchpad only).
    workspace_swipe_forever = false 	                            # if enabled, swiping will not clamp at the neighboring workspaces but continue to the further ones.
    workspace_swipe_use_r = true 	                                # if enabled, swiping will use the r prefix instead of the m prefix for finding workspaces.
    close_max_timeout = 1000 	                                    # the timeout for a window to close when using a 1:1 gesture, in ms
}
