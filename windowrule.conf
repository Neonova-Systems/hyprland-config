# ░▀░▀░▀▀▀░▀░▀░▀▀░░▀▀▀░▀░▀░░░▀░▀░▀▀▀░▀▀▀░▀▀▀
# https://wiki.hyprland.org/Configuring/Window-Rules/

# Workspace routing
windowrulev2 = workspace 3,class:^(foot)$
windowrulev2 = workspace 2,class:^(firefox|librewolf|qutebrowser|chromium|chrome)$

# Per-app behavior
windowrulev2 = immediate,class:^(cs2)$
windowrulev2 = pin,title:^(Picture-in-Picture)$
windowrulev2 = float,title:^(Picture-in-Picture|.*Sharing Indicator.*)$
windowrulev2 = float,class:^(pavucontrol|nemo|pcmanfm|thunar|file-roller|gucharmap)$
windowrulev2 = animation slide left,class:^(nemo|pcmanfm|thunar|file-roller)$
windowrulev2 = animation slide bottom,class:^(firefox|librewolf|qutebrowser)$
windowrulev2 = move cursor -50% -50%,class:^(nemo|pcmanfm|thunar|file-roller|gucharmap)$
windowrulev2 = nofocus,class:^(Ibus-ui-gtk3)$
windowrulev2 = idleinhibit focus,class:^(mpv)$
windowrulev2 = move 0 0,title:^(.*Sharing Indicator.*)$

# Layer effects
layerrule = blur, gtk-layer-shell
layerrule = blur, bottomlayer
layerrule = ignorealpha 0.18, bottomlayer
layerrule = ignorealpha 0.38, gtk-layer-shell
layerrule = blur, demo
layerrule = ignorealpha 0.38, demo
layerrule = blur, main-dashboard
layerrule = ignorealpha 0.38, main-dashboard
layerrule = blur, wofi
layerrule = ignorezero, wofi
layerrule = blur, vicinae
