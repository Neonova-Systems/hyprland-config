# https://wiki.hypr.land/Configuring/Window-Rules/

# Workspace routing
windowrule = workspace 1 silent, match:class ^(firefox|librewolf|qutebrowser|chromium|google-chrome|zen-browser)$
windowrule = workspace 2 silent, match:class ^(code|code-oss|VSCodium|jetbrains-.*|nvim-qt|emacs)$
windowrule = workspace 3, match:class ^(foot|kitty|Alacritty|wezterm)$
windowrule = workspace 4 silent, match:class ^(thunar|nemo|pcmanfm|org.gnome.Nautilus|dolphin)$
windowrule = workspace 5, match:class ^(discord|vesktop|Slack|TelegramDesktop|org.telegram.desktop|Element)$
windowrule = workspace 6, match:class ^(Spotify|spotify|mpv|vlc|celluloid|youtube-music)$
windowrule = workspace 7 silent, match:class ^(steam|lutris|heroic|gamescope|com.heroicgameslauncher.hgl)$
windowrule = workspace 8 silent, match:class ^(virt-manager|org.remmina.Remmina|Remmina|Vmware|VirtualBox Manager)$
windowrule = workspace 9 silent, match:class ^(obs|com.obsproject.Studio|Gimp|krita|Inkscape)$

# Per-app behavior
windowrule = immediate on, match:class ^(cs2)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Picture-in-Picture|.*Sharing Indicator.*)$
windowrule = float on, match:class ^(pavucontrol|nemo|pcmanfm|thunar|file-roller|gucharmap)$
windowrule = animation slide right, match:class ^(nemo|pcmanfm|thunar|file-roller)$
windowrule = animation slide up, match:class ^(firefox|librewolf|google-chrome|qutebrowser)$
windowrule = move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5)), match:class ^(nemo|pcmanfm|thunar|file-roller|gucharmap)$
windowrule = no_focus on, match:class ^(Ibus-ui-gtk3)$
windowrule = idle_inhibit focus, match:class ^(mpv)$
windowrule = move 0 0, match:title ^(.*Sharing Indicator.*)$
windowrule = rounding 0, match:initial_title ^(win0|win1)$, match:class ^$ # Sql developer ribbon menu client

windowrule = no_screen_share on, match:class ^(KeePassXC|Bitwarden|1Password)$ # Privacy mode for sensitive apps: hide from screen sharing
windowrule = allows_input on, match:xwayland 1, match:class ^(steam|lutris|heroic|steamwebhelper|gamescope|com.heroicgameslauncher.hgl)$ # Force launchers/game clients to accept input focus
windowrule = dim_around on, match:class ^(pavucontrol|blueman-manager)$ # Auto-dim background around specific floating popups
windowrule = stay_focused on, match:class ^(pinentry-.*)$ # Sticky focus for pinentry/password dialogs (no random focus loss)
windowrule = nearest_neighbor on, match:class ^(retroarch|mGBA|Snes9x|PCSX2)$  # Force nearest-neighbor only for retro emulators (pixel-perfect scaling)

# Advanced reliability + gaming behavior
windowrule = float on, match:modal 1
windowrule = center on, match:modal 1
windowrule = no_initial_focus on, match:title ^(.*Sharing Indicator.*)$
windowrule = focus_on_activate on, match:class ^(steam|lutris|heroic|gamescope)$
windowrule = sync_fullscreen on, match:class ^(gamescope|steam_app_.*)$
windowrule = no_shortcuts_inhibit on, match:class ^(steam|gamescope)$
windowrule = render_unfocused on, match:class ^(obs|com.obsproject.Studio)$

# Dynamic tagging + conditional style chain
windowrule = tag +media, match:class ^(mpv|vlc|celluloid)$
windowrule = opacity 1.0 override 0.92 override 1.0 override, match:tag media
windowrule = border_color rgb(8ec07c), match:tag media

# Make photo/content apps advertise content type for better VRR/HDR behavior
windowrule = content photo, match:class ^(imv|nsxiv|feh)$
windowrule = content video, match:class ^(mpv|vlc|celluloid)$
windowrule = content game, match:class ^(gamescope|steam_app_.*)$

# Keep utility windows always centered and remembered
windowrule = float on, match:class ^(qalculate-gtk|org.gnome.Calculator|nm-connection-editor)$
windowrule = center on, match:class ^(qalculate-gtk|org.gnome.Calculator|nm-connection-editor)$
windowrule = persistent_size on, match:class ^(qalculate-gtk|org.gnome.Calculator|nm-connection-editor)$

# Disable blur + shadow for terminals for a clean "glassless" coding mode
windowrule = no_blur on, match:class ^(foot|kitty|Alacritty)$
windowrule = no_shadow on, match:class ^(foot|kitty|Alacritty)$

# Layer effects
layerrule = blur on, match:namespace ^(wofi|vicinae|main-dashboard)$
layerrule = ignore_alpha 0.35, match:namespace ^(wofi|vicinae|main-dashboard)$
layerrule = blur_popups on, match:namespace ^(wofi|vicinae)$
layerrule = dim_around on, match:namespace ^(wofi|vicinae)$
layerrule = animation slide up, match:namespace ^(workspace-info-osd)$
layerrule = blur on, match:namespace gtk-layer-shell
layerrule = blur on, match:namespace bottomlayer
layerrule = ignore_alpha 0.18, match:namespace bottomlayer
layerrule = ignore_alpha 0.38, match:namespace gtk-layer-shell
layerrule = blur on, match:namespace demo
layerrule = ignore_alpha 0.38, match:namespace demo

# Coverage gap pack (high-value, low-risk extras)
windowrule = keep_aspect_ratio on, match:class ^(imv|nsxiv|feh)$
windowrule = no_follow_mouse on, match:class ^(Ibus-ui-gtk3)$
windowrule = no_anim on, match:title ^(.*Sharing Indicator.*)$
windowrule = focus_on_activate off, match:class ^(KeePassXC|Bitwarden|1Password)$
windowrule = rounding 18, match:class ^(qalculate-gtk|org.gnome.Calculator|nm-connection-editor)$
windowrule = min_size 560 360, match:class ^(pavucontrol|blueman-manager)$
windowrule = max_size 1400 900, match:class ^(pavucontrol|blueman-manager)$
windowrule = monitor eDP-1, match:class ^(pavucontrol)$
windowrule = opacity 0.98, match:content 2
windowrule = border_color rgb(89b4fa), match:workspace 2

layerrule = no_anim on, match:namespace ^(wofi|vicinae)$
layerrule = order 20, match:namespace ^(wofi|vicinae)$

windowrule = no_initial_focus on, match:initial_title ^(.*Sharing Indicator.*)$
windowrule = float on, match:initial_class ^(steam|lutris|heroic)$
windowrule = opacity 0.96, match:float 1
windowrule = border_color rgb(f38ba8), match:fullscreen_state_internal 2
windowrule = border_color rgb(a6e3a1), match:fullscreen_state_client 2
windowrule = opacity 1.0 override 0.95 override, match:fullscreen 1
windowrule = dim_around on, match:pin 1
windowrule = border_color rgb(f9e2af), match:group 1
windowrule = suppress_event activate activatefocus, match:title ^(.*Sharing Indicator.*)$
windowrule = group barred, match:class ^(steamwebhelper)$
windowrule = tag +has-xdgtag, match:xdg_tag .+

layerrule = above_lock 1, match:namespace ^(notifications|swaync-control-center)$
layerrule = no_screen_share on, match:namespace ^(notifications)$

# https://wiki.hypr.land/Configuring/Uncommon-tips--tricks/#shimeji
windowrule {
	name = shimeji
	match:class = com-group_finity-mascot-Main
	
	float = true
	no_blur = true
	no_focus = true
	no_shadow = true
	border_size = 0
}