# Core window and layout controls
bindd = SUPERSHIFT,E,Exit Hyprland,exit,
bindd = SUPERCONTROL,S,Stop session via uwsm,exec, uwsm stop # Super + Ctrl + s: Graceful session stop (uwsm)
bindd = SUPER,C,Close active window,killactive,
bindd = SUPER,F,Toggle fullscreen,fullscreen,0
bindd = SUPERSHIFT,F,Toggle floating workspace mode,workspaceopt,allfloat
bindm = SUPER,mouse:272,movewindow
bindd = SUPER,print,Scan QR code,exec, $zsh "scan-qr"
bindd = SUPERCONTROL,P,Pin focused floating window,pin,active
bindd = SUPER,M,Swap with master,layoutmsg,swapwithmaster
bindd = SUPER,return,Focus master,layoutmsg,focusmaster
bindd = SUPER,i,Add master slot,layoutmsg,addmaster
bindd = SUPER,d,Remove master slot,layoutmsg,removemaster
bindd = SUPERSHIFT,space,Cycle layout orientation,layoutmsg,orientationnext
bindd = SUPER,j,Focus next in layout,layoutmsg,cyclenext noloop
bindd = SUPER,k,Focus previous in layout,layoutmsg,cycleprev noloop
bindd = SUPERSHIFT,j,Swap next in layout,layoutmsg,swapnext noloop
bindd = SUPERSHIFT,k,Swap previous in layout,layoutmsg,swapprev noloop
bindde = SUPER,H,Shrink master width,layoutmsg,mfact -0.05
bindde = SUPER,L,Grow master width,layoutmsg,mfact +0.05
